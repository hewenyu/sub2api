# Debug configuration for Docker Compose deployment
# This configuration is intended for local debugging and development.

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"              # Gin mode: debug for verbose logging
  read_timeout: "60s"
  write_timeout: "60s"

database:
  host: "postgres"           # Docker service name
  port: 5432
  user: "relay"
  password: "relay123"
  database: "claude_relay"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: "5m"
  conn_max_idle_time: "10m"

redis:
  host: "redis"              # Docker service name
  port: 6379
  password: "redis123"
  db: 0
  pool_size: 100

security:
  jwt_secret: "6037157e95f37834a29edff982285688"  # Debug only, change for real use
  encryption_key: "6037157e95f37834a29edff982285688"
  token_expiration: "24h"

claude:
  client_id: "your-claude-oauth-client-id"
  client_secret: "your-claude-oauth-client-secret"
  redirect_uri: "http://localhost:3000/callback"
  base_api: "https://api.claude.ai"
  auth_url: "https://accounts.claude.ai/oauth2/authorize"
  token_url: "https://accounts.claude.ai/oauth2/token"

codex:
  base_api: "https://api.openai.com"
  oauth:
    client_id: "app_EMoamEEZ73f0CkXaXp7hrann"
    client_secret: ""
    auth_url: "https://auth.openai.com/oauth/authorize"
    token_url: "https://auth.openai.com/oauth/token"
    scopes: "openid profile email offline_access"

limits:
  default_concurrent_requests: 10
  default_rate_limit_per_minute: 60
  default_rate_limit_per_hour: 3600
  default_rate_limit_per_day: 86400

billing:
  pricing_url: "https://www.anthropic.com/api/pricing"
  update_interval: "24h"

logging:
  level: "debug"                         # More verbose logging for debugging
  format: "json"                         # Or "console" if you prefer readable logs
  output_path: "./logs/claude_relay_debug.log"          # Debug log file inside container
  error_output_path: "./logs/claude_relay_debug_error.log"  # Debug error log file
  log_payloads: true                     # Enable request/response payload logging in debug

metrics:
  enabled: true
  port: 9090
  path: "/metrics"

scheduler:
  strategy: "priority"
  session_ttl: "1h"

retry:
  max_attempts: 3
  initial_backoff: "100ms"
  max_backoff: "5s"
  multiplier: 2.0
  jitter: 0.1
