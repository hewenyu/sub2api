name: Backend Lint

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-lint.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-lint.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'
          cache-dependency-path: backend/go.sum

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test
